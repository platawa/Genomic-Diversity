# Genomic Diversity — Evo 2 Entropy Scoring Pipeline
# Create with: conda env create -f environment.yml
# Activate with: conda activate genomic-diversity
#
# Note: Evo 2 must be installed separately after creating this environment.
# See https://github.com/ArcInstitute/evo2 for instructions.
#
# For exact reproduction on ORCD cluster, use the frozen environment:
#   conda activate evo2_sep28

name: genomic-diversity

channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults

dependencies:
  - python>=3.11,<3.13
  - numpy>=1.24
  - scipy>=1.11
  - pandas>=2.0
  - matplotlib>=3.7
  - seaborn>=0.12
  - scikit-learn>=1.3
  - biopython>=1.81
  - psutil>=5.9

  # PyTorch — adjust cuda version to match your system
  - pytorch>=2.1
  - pytorch-cuda=12.1

  - pip:
    - huggingface_hub>=0.19
